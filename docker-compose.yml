services:
  media-stack-mcp:
    build: .
    container_name: media-stack-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: http
    ports:
      - "3000:3000"
    networks:
      - media-stack

  # Optional Cloudflare Tunnel sidecar. Off by default; only starts when the
  # "cloudflare" profile is enabled, e.g. `docker compose --profile cloudflare up -d`.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: media-stack-mcp-cloudflared
    restart: unless-stopped
    profiles:
      - cloudflare
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN:-}
    depends_on:
      - media-stack-mcp
    networks:
      - media-stack

networks:
  media-stack:
    external: true
