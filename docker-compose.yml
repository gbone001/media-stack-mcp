services:
  media-stack-mcp:
    build: .
    container_name: media-stack-mcp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: http
    ports:
      - "3000:3000"
    networks:
      - media-stack

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: media-stack-mcp-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARED_TOKEN}
    depends_on:
      - media-stack-mcp
    networks:
      - media-stack

networks:
  media-stack:
    external: true
